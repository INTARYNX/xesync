<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTMS Rowing Display</title>
  <link rel="stylesheet" href="rowing_display.css">
  <link rel="stylesheet" href="dialog.css">
</head>
<body>
  <div id="main-container">
    <div id="wrapper">
      <canvas id="glCanvas"></canvas>
      <div id="gl-loading"></div>

      <div class="hud-corner tl">
        <div class="hud-tile" style="--accent:#ff4d6d;">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>
          <div class="hud-content">
            <div class="hud-label">PULSE</div>
            <div class="hud-value"><span id="heartrate">-</span></div>
          </div>
        </div>
        <div class="hud-tile" style="--accent:#4ade80;">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.3 8.7 8.7 21.3a2.41 2.41 0 0 1-3.4 0L2.7 18.7a2.41 2.41 0 0 1 0-3.4L15.3 2.7a2.41 2.41 0 0 1 3.4 0l2.6 2.6a2.41 2.41 0 0 1 0 3.4Z"/><path d="m7.5 10.5 2 2"/><path d="m10.5 7.5 2 2"/><path d="m13.5 4.5 2 2"/><path d="m4.5 13.5 2 2"/></svg>
          <div class="hud-content">
            <div class="hud-label">METERS</div>
            <div class="hud-value"><span id="distance">0</span></div>
          </div>
        </div>
      </div>

      <div class="hud-corner tr">
        <div class="hud-tile" style="--accent:#a78bfa;">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          <div class="hud-content">
            <div class="hud-label">SPM</div>
            <div class="hud-value"><span id="spm">0</span></div>
          </div>
        </div>
        <div class="hud-tile" style="--accent:#60a5fa;">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <div class="hud-content">
            <div class="hud-label">TIME</div>
            <div class="hud-value"><span id="elapsedtime">00:00</span></div>
          </div>
        </div>
      </div>

      <div class="hud-corner bl">
        <div class="hud-tile" style="--accent:#fbbf24;">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <div class="hud-content">
            <div class="hud-label">WATTS</div>
            <div class="hud-value"><span id="watts">0</span></div>
          </div>
        </div>
        <div class="hud-tile" style="--accent:#22d3ee;">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
          <div class="hud-content">
            <div class="hud-label">/500M</div>
            <div class="hud-value"><span id="pace">--:--</span></div>
          </div>
        </div>
      </div>

      <div class="hud-corner br">
        <div class="hud-tile" style="--accent:#fb923c;">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
          <div class="hud-content">
            <div class="hud-label">CALS</div>
            <div class="hud-value"><span id="cals">0</span></div>
          </div>
        </div>
        <div class="hud-tile" style="--accent:#f472b6;">
          <svg class="hud-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h2l4-9 8 18 4-9h2"/></svg>
          <div class="hud-content">
            <div class="hud-label">STROKES</div>
            <div class="hud-value"><span id="strokes">0</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script id="vs" type="x-shader/x-vertex">
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main() {
      v_uv = a_pos * 0.5 + 0.5;
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  </script>

  <script id="fs" type="x-shader/x-fragment">
    precision highp float;
    varying vec2 v_uv;
    uniform float u_time;
    uniform float u_speed;
    uniform float u_flow;
    uniform float u_phase;
    uniform float u_spm;
    uniform float u_scale;
    uniform float u_aspect;

    // Wrap large coordinates before feeding them into hash/noise so float
    // precision stays usable on mobile GPUs over long sessions.
    vec2 wrapCoord(vec2 p) {
      return mod(p, 1024.0);
    }

    float hash(vec2 p){
      p = wrapCoord(p);
      p = fract(p * vec2(123.34, 456.21));
      p += dot(p, p + 45.32);
      return fract(p.x * p.y);
    }
    float noise(vec2 p){
      p = wrapCoord(p);
      vec2 i = floor(p), f = fract(p);
      vec2 u = f*f*f*(f*(f*6.0-15.0)+10.0);
      return mix(mix(hash(i),           hash(i+vec2(1,0)), u.x),
                 mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
    }
    float fbm(vec2 p){
      p = wrapCoord(p);
      float v = 0.0, a = 0.5;
      for(int i=0;i<6;i++){ v += a*noise(p); p = p*2.03 + 17.0; a *= 0.5; }
      return v;
    }
    float sdEllipse(vec2 p, vec2 r){
      float k = length(p / r);
      return (k - 1.0) * min(r.x, r.y);
    }
    float sdSegment(vec2 p, vec2 a, vec2 b){
      vec2 pa = p - a, ba = b - a;
      float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
      return length(pa - ba * h);
    }

    void main(){
      float u = v_uv.x;
      float y = v_uv.y;
      float horizon = 0.5;
      float flow = u_flow;
      vec2 P = vec2(u, y);
      float aspect = u_aspect;
      P = vec2((P.x - 0.5) * aspect + 0.5, P.y);

      vec3 col;

      // ============ BACKGROUND ============
      if (y > horizon) {
        float sy = (y - horizon) / (1.0 - horizon);

        float dayCycle = fract(u_time / 300.0);

        vec3 skyTopDawn = vec3(0.62, 0.40, 0.62);
        vec3 skyMidDawn = vec3(1.00, 0.60, 0.45);
        vec3 skyBotDawn = vec3(1.00, 0.78, 0.50);

        vec3 skyTopDay = vec3(0.38, 0.58, 0.88);
        vec3 skyMidDay = vec3(0.78, 0.85, 0.92);
        vec3 skyBotDay = vec3(0.98, 0.88, 0.75);

        vec3 skyTopDusk = vec3(0.50, 0.22, 0.50);
        vec3 skyMidDusk = vec3(1.00, 0.38, 0.28);
        vec3 skyBotDusk = vec3(1.00, 0.65, 0.32);

        vec3 skyTopNight = vec3(0.08, 0.06, 0.22);
        vec3 skyMidNight = vec3(0.18, 0.10, 0.30);
        vec3 skyBotNight = vec3(0.30, 0.18, 0.38);

        vec3 skyTop, skyMid, skyBottom;
        if (dayCycle < 0.25) {
          float t = dayCycle / 0.25;
          skyTop    = mix(skyTopDawn, skyTopDay, t);
          skyMid    = mix(skyMidDawn, skyMidDay, t);
          skyBottom = mix(skyBotDawn, skyBotDay, t);
        } else if (dayCycle < 0.5) {
          float t = (dayCycle - 0.25) / 0.25;
          skyTop    = mix(skyTopDay, skyTopDusk, t);
          skyMid    = mix(skyMidDay, skyMidDusk, t);
          skyBottom = mix(skyBotDay, skyBotDusk, t);
        } else if (dayCycle < 0.75) {
          float t = (dayCycle - 0.5) / 0.25;
          skyTop    = mix(skyTopDusk, skyTopNight, t);
          skyMid    = mix(skyMidDusk, skyMidNight, t);
          skyBottom = mix(skyBotDusk, skyBotNight, t);
        } else {
          float t = (dayCycle - 0.75) / 0.25;
          skyTop    = mix(skyTopNight, skyTopDawn, t);
          skyMid    = mix(skyMidNight, skyMidDawn, t);
          skyBottom = mix(skyBotNight, skyBotDawn, t);
        }

        vec3 sky = mix(skyBottom, skyMid, smoothstep(0.0, 0.45, sy));
        sky = mix(sky, skyTop, smoothstep(0.45, 1.0, sy));
        col = sky;

        float sunHeight = sin(dayCycle * 6.2831853 - 1.57);
        bool isDay = sunHeight > -0.3;
        float sunY = horizon + 0.05 + max(sunHeight, -0.3) * 0.40;
        float sunX = 0.30 + dayCycle * 0.6;
        sunX = mod(sunX, 1.0);
        vec2 sunPos = vec2(sunX, sunY);
        float sunD = distance(P, sunPos);
        vec3 sunCol;
        float sunIntensity;
        if (isDay) {
          float warmth = 1.0 - abs(sunHeight - 0.5) * 0.8;
          sunCol = mix(vec3(1.0, 0.65, 0.40), vec3(1.0, 0.95, 0.82), 1.0 - warmth);
          sunIntensity = 1.0;
        } else {
          sunCol = vec3(0.85, 0.88, 0.95);
          sunIntensity = 0.7;
        }
        float sunDisk = smoothstep(0.075, 0.060, sunD);
        float sunGlow = smoothstep(0.40, 0.0, sunD) * 0.40 * sunIntensity;
        col += sunCol * sunGlow * 0.8;
        col = mix(col, sunCol, sunDisk * sunIntensity);

        float nightFactor = smoothstep(0.55, 0.75, dayCycle) *
                           (1.0 - smoothstep(0.95, 1.0, dayCycle));
        if (nightFactor > 0.0) {
          float starN = noise(vec2(u * 200.0, sy * 200.0));
          float stars = smoothstep(0.93, 0.99, starN) * smoothstep(0.0, 0.6, sy);
          col += vec3(1.0, 1.0, 0.95) * stars * nightFactor * 0.8;
        }

        float cloudScroll = flow * 0.25;
        float cloudN = fbm(vec2((u - cloudScroll) * 2.5, sy * 3.0 + 5.0));
        float cloudMask = smoothstep(0.50, 0.78, cloudN) * smoothstep(0.0, 0.5, sy);
        vec3 cloudColor = mix(vec3(1.0, 0.88, 0.78), vec3(0.30, 0.32, 0.45),
                             smoothstep(0.55, 0.75, dayCycle) * (1.0 - smoothstep(0.95, 1.0, dayCycle)));
        col = mix(col, cloudColor, cloudMask * 0.55);

        float darknessFactor = smoothstep(0.55, 0.75, dayCycle) *
                              (1.0 - smoothstep(0.95, 1.0, dayCycle));
        #define LAYER(BASE, AMP, FREQ, PHASE, TOPR, TOPG, TOPB, BOTR, BOTG, BOTB, SPD) \
        { \
          float baseY = horizon + BASE; \
          float scrolled = u - flow * SPD; \
          float n = noise(vec2(scrolled * 8.0, baseY * 5.0)) * 0.5 - 0.25; \
          float wave = sin(scrolled * FREQ + PHASE) * AMP + n * AMP; \
          float lineY = baseY + wave; \
          if (y < lineY) { \
            float t = clamp((lineY - y) / (lineY - horizon + 0.001), 0.0, 1.0); \
            vec3 topC = vec3(TOPR, TOPG, TOPB); \
            vec3 botC = vec3(BOTR, BOTG, BOTB); \
            vec3 layerCol = mix(topC, botC, t); \
            layerCol = mix(layerCol, layerCol * vec3(0.25, 0.25, 0.40), darknessFactor); \
            col = mix(col, layerCol, 1.0); \
          } \
        }
        LAYER(0.18, 0.020, 18.0, 0.0,  0.78, 0.55, 0.65,  0.62, 0.42, 0.55,  0.10)
        LAYER(0.15, 0.018, 22.0, 1.5,  0.70, 0.46, 0.58,  0.55, 0.36, 0.50,  0.14)
        LAYER(0.12, 0.016, 26.0, 3.0,  0.62, 0.38, 0.52,  0.48, 0.30, 0.46,  0.18)
        LAYER(0.09, 0.014, 28.0, 0.5,  0.54, 0.32, 0.48,  0.42, 0.26, 0.42,  0.22)
        LAYER(0.07, 0.012, 32.0, 2.5,  0.46, 0.28, 0.44,  0.36, 0.22, 0.38,  0.26)
        LAYER(0.05, 0.010, 36.0, 1.0,  0.38, 0.24, 0.40,  0.30, 0.20, 0.34,  0.30)
        LAYER(0.03, 0.008, 40.0, 4.0,  0.30, 0.20, 0.34,  0.24, 0.18, 0.30,  0.34)
        LAYER(0.01, 0.007, 44.0, 2.0,  0.22, 0.18, 0.30,  0.18, 0.16, 0.26,  0.40)
      } else {
        float yw = y / horizon;
        float depth = 1.0 - yw;
        float yScale = mix(2.5, 12.0, smoothstep(0.0, 1.0, yw));
        vec2 q = vec2((u - flow) * 4.0, yw * yScale);
        float n1 = fbm(q);
        float n2 = fbm(q * 2.1 + vec2(flow * 1.3, 0.0));
        float waves = n1 * 0.6 + n2 * 0.4;
        float dayCycleW = fract(u_time / 300.0);
        float darknessW = smoothstep(0.55, 0.75, dayCycleW) *
                         (1.0 - smoothstep(0.95, 1.0, dayCycleW));
        vec3 farColDay = vec3(0.92, 0.65, 0.58);
        vec3 midColDay = vec3(0.55, 0.40, 0.55);
        vec3 nearColDay = vec3(0.22, 0.18, 0.36);
        vec3 farColNight = vec3(0.18, 0.20, 0.38);
        vec3 midColNight = vec3(0.10, 0.12, 0.25);
        vec3 nearColNight = vec3(0.04, 0.05, 0.14);
        vec3 farCol  = mix(farColDay,  farColNight, darknessW);
        vec3 midCol  = mix(midColDay,  midColNight, darknessW);
        vec3 nearCol = mix(nearColDay, nearColNight, darknessW);
        vec3 base = mix(nearCol, midCol, smoothstep(0.0, 0.6, yw));
        base = mix(base, farCol, smoothstep(0.7, 1.0, yw));
        float crest = pow(waves, mix(1.5, 3.5, depth));
        col = base + vec3(0.30, 0.22, 0.18) * crest * mix(0.3, 1.0, depth) * (1.0 - darknessW * 0.6);
        float sparkleN = noise(vec2((u - flow * 4.0) * 140.0, yw * 110.0 + u_time * 2.0));
        float sparkle = smoothstep(0.92, 0.99, sparkleN) * mix(0.0, 1.0, depth);
        vec3 sparkleCol = mix(vec3(1.0, 0.85, 0.65), vec3(0.85, 0.90, 1.0), darknessW);
        col += sparkleCol * sparkle * 0.7;
        float band = exp(-pow((yw - 0.50) * 4.0, 2.0));
        vec3 reflectCol = mix(vec3(1.0, 0.75, 0.55), vec3(0.6, 0.65, 0.85), darknessW);
        col += reflectCol * band * crest * 0.50;
        float haze = smoothstep(0.75, 1.0, yw);
        vec3 hazeCol = mix(vec3(0.95, 0.78, 0.70), vec3(0.20, 0.22, 0.36), darknessW);
        col = mix(col, hazeCol, haze * 0.6);

        // ===== Reflet du soleil/lune dans l'eau =====
        float dayCycleS = fract(u_time / 300.0);
        float sunHeightS = sin(dayCycleS * 6.2831853 - 1.57);
        bool isDayS = sunHeightS > -0.3;
        float sunYS = horizon + 0.05 + max(sunHeightS, -0.3) * 0.40;
        float sunXS = mod(0.30 + dayCycleS * 0.6, 1.0);
        float visibilityFactor = smoothstep(horizon + 0.12, horizon + 0.22, sunYS);
        if (visibilityFactor > 0.01) {
          float distFromSunX = abs(P.x - sunXS);
          float reflectWidth = mix(0.015, 0.12, 1.0 - yw);
          float reflectShape = smoothstep(reflectWidth, reflectWidth * 0.2, distFromSunX);
          float reflectFade = smoothstep(0.0, 0.8, yw);
          float reflectRipple = smoothstep(0.3, 0.7, waves);
          vec3 reflectSunCol;
          float reflectIntensity;
          if (isDayS) {
            float warmth = 1.0 - abs(sunHeightS - 0.5) * 0.8;
            reflectSunCol = mix(vec3(1.0, 0.55, 0.30), vec3(1.0, 0.92, 0.78), 1.0 - warmth);
            reflectIntensity = 0.7;
          } else {
            reflectSunCol = vec3(0.85, 0.88, 0.95);
            reflectIntensity = 0.4;
          }
          float sunReflect = reflectShape * reflectFade * reflectRipple * reflectIntensity * visibilityFactor;
          col = mix(col, reflectSunCol, sunReflect);
        }
      }

      // ============ ROWER ANIMATION ============
      float strokesPerSec = u_spm / 60.0;
      float phase = u_phase;
      float fIdx = phase * 8.0;
      int i0 = int(floor(fIdx));
      int i1 = int(mod(float(i0 + 1), 8.0));
      float t = fract(fIdx);

      vec2 KF[56];
      KF[0]  = vec2(0.00, 0.00); KF[1]  = vec2(0.10, 0.55); KF[2]  = vec2(0.55, 0.45);
      KF[3]  = vec2(0.40, 1.30); KF[4]  = vec2(-0.30, 1.10); KF[5] = vec2(-0.95, 0.95);
      KF[6]  = vec2(0.45, 1.55);
      KF[7]  = vec2(0.00, 0.00); KF[8]  = vec2(0.30, 0.50); KF[9]  = vec2(0.75, 0.40);
      KF[10] = vec2(0.60, 1.25); KF[11] = vec2(-0.10, 1.05); KF[12]= vec2(-0.85, 0.90);
      KF[13] = vec2(0.65, 1.50);
      KF[14] = vec2(0.00, 0.00); KF[15] = vec2(0.55, 0.30); KF[16] = vec2(1.10, 0.35);
      KF[17] = vec2(1.05, 1.20); KF[18] = vec2(0.40, 1.05); KF[19] = vec2(-0.30, 0.95);
      KF[20] = vec2(1.10, 1.50);
      KF[21] = vec2(0.00, 0.00); KF[22] = vec2(0.65, 0.15); KF[23] = vec2(1.30, 0.30);
      KF[24] = vec2(1.55, 1.10); KF[25] = vec2(1.55, 0.80); KF[26] = vec2(1.20, 0.85);
      KF[27] = vec2(1.65, 1.40);
      KF[28] = vec2(0.00, 0.00); KF[29] = vec2(0.65, 0.15); KF[30] = vec2(1.30, 0.30);
      KF[31] = vec2(1.45, 1.15); KF[32] = vec2(1.20, 0.85); KF[33] = vec2(0.50, 1.10);
      KF[34] = vec2(1.55, 1.45);
      KF[35] = vec2(0.00, 0.00); KF[36] = vec2(0.55, 0.20); KF[37] = vec2(1.20, 0.30);
      KF[38] = vec2(1.05, 1.20); KF[39] = vec2(0.55, 1.15); KF[40] = vec2(-0.10, 1.20);
      KF[41] = vec2(1.10, 1.50);
      KF[42] = vec2(0.00, 0.00); KF[43] = vec2(0.30, 0.40); KF[44] = vec2(0.90, 0.35);
      KF[45] = vec2(0.70, 1.25); KF[46] = vec2(0.10, 1.15); KF[47] = vec2(-0.55, 1.10);
      KF[48] = vec2(0.75, 1.50);
      KF[49] = vec2(0.00, 0.00); KF[50] = vec2(0.10, 0.55); KF[51] = vec2(0.55, 0.45);
      KF[52] = vec2(0.40, 1.30); KF[53] = vec2(-0.30, 1.10); KF[54]= vec2(-0.95, 0.95);
      KF[55] = vec2(0.45, 1.55);

      vec2 pts[7];
      for (int p = 0; p < 7; p++) {
        vec2 a = vec2(0.0);
        vec2 b = vec2(0.0);
        for (int k = 0; k < 8; k++) {
          for (int q = 0; q < 7; q++) {
            if (q == p) {
              if (k == i0) a = KF[k * 7 + q];
              if (k == i1) b = KF[k * 7 + q];
            }
          }
        }
        pts[p] = mix(a, b, t);
      }

      float scale = 0.075 * u_scale;
      vec2 origin   = vec2(0.5 - 0.02 * u_scale, horizon * 0.5);
      vec2 foot     = origin + vec2(pts[0].x, pts[0].y) * scale;
      vec2 knee     = origin + vec2(pts[1].x, pts[1].y) * scale;
      vec2 hip      = origin + vec2(pts[2].x, pts[2].y) * scale;
      vec2 shoulder = origin + vec2(pts[3].x, pts[3].y) * scale;
      vec2 elbow    = origin + vec2(pts[4].x, pts[4].y) * scale;
      vec2 hand     = origin + vec2(pts[5].x, pts[5].y) * scale;
      vec2 head     = origin + vec2(pts[6].x, pts[6].y) * scale + vec2(0.0, 0.018 * u_scale);
      vec2 oarlock  = origin + vec2(-0.4, 0.7) * scale;

      vec2 oarDir = normalize(oarlock - hand);
      float handToLock = length(oarlock - hand);
      float pCycle = pow(phase, 0.7);
      float bladeCycle = 0.5 + 0.5 * cos(pCycle * 2.0 * 3.14159265);
      float bladeArm = mix(0.24, 0.32, bladeCycle) * u_scale;
      vec2 bladeTip = hand + oarDir * (handToLock + bladeArm);

      float oarWL = (origin.y + 0.025 * u_scale) - 0.085 * u_scale;
      float clampStrength = 1.0;
      if (phase < 0.5) clampStrength = 0.0;
      else if (phase >= 0.875) clampStrength = 1.0 - (phase - 0.875) / 0.125;
      if (clampStrength > 0.0 && bladeTip.y < oarWL + 0.005) {
        float targetY = oarWL + 0.005;
        if (abs(oarDir.y) > 0.0001) {
          float tLine = (targetY - hand.y) / oarDir.y;
          vec2 clampedTip = hand + oarDir * tLine;
          bladeTip = mix(bladeTip, clampedTip, clampStrength);
        }
      }

      vec2 boatCenter = vec2(0.5, origin.y + 0.012 * u_scale);

      // ============ REFLET DU RAMEUR ============
      if (y < boatCenter.y) {
        float reflectCompress = 0.75;
        float reflectY = boatCenter.y + (boatCenter.y - y) / reflectCompress;
        vec2 reflectP = vec2(P.x, reflectY);
        float reflectDist = boatCenter.y - y;
        float reflectAtten = smoothstep(0.18 * u_scale, 0.0, reflectDist);
        if (reflectAtten > 0.0) {
          float ripple = sin(reflectDist * 80.0 + u_time * 1.5) * 0.003 * u_scale;
          reflectP.x += ripple;
          float refMask = 0.0;
          float refS;
          refS = sdSegment(reflectP, hip, knee);
          refMask = max(refMask, smoothstep(0.012 * u_scale, 0.010 * u_scale, refS));
          refS = sdSegment(reflectP, knee, foot);
          refMask = max(refMask, smoothstep(0.010 * u_scale, 0.008 * u_scale, refS));
          refS = sdSegment(reflectP, hip, shoulder);
          refMask = max(refMask, smoothstep(0.017 * u_scale, 0.015 * u_scale, refS));
          refS = sdSegment(reflectP, shoulder, elbow);
          refMask = max(refMask, smoothstep(0.011 * u_scale, 0.009 * u_scale, refS));
          refS = sdSegment(reflectP, elbow, hand);
          refMask = max(refMask, smoothstep(0.010 * u_scale, 0.008 * u_scale, refS));
          refS = distance(reflectP, head);
          refMask = max(refMask, smoothstep(0.020 * u_scale, 0.017 * u_scale, refS));
          vec2 neckTopR = head + vec2(0.0, -0.018 * u_scale);
          refS = sdSegment(reflectP, shoulder, neckTopR);
          refMask = max(refMask, smoothstep(0.008 * u_scale, 0.006 * u_scale, refS));
          float capRadius = 0.020 * u_scale;
          float capRefDist = distance(reflectP, head);
          float capRefMask = smoothstep(capRadius, capRadius - 0.001, capRefDist) *
                            step(head.y, reflectP.y);
          refMask = max(refMask, capRefMask);
          vec2 capFaceDirR = vec2(sign(hand.x - shoulder.x), 0.0);
          vec2 visorCenterR = head + capFaceDirR * 0.014 * u_scale + vec2(0.0, 0.002 * u_scale);
          float visorR = sdEllipse(reflectP - visorCenterR, vec2(0.012, 0.003) * u_scale);
          float visorRefMask = smoothstep(0.001, -0.001, visorR);
          refMask = max(refMask, visorRefMask);
          vec2 oarVecR = bladeTip - hand;
          float oarLenR = length(oarVecR);
          vec2 oarTR = oarVecR / oarLenR;
          vec2 oarNR = vec2(-oarTR.y, oarTR.x);
          float bladeStartR = oarLenR * 0.85;
          float shaftHalfR = 0.003 * u_scale;
          float oarWaterlineR = boatCenter.y - 0.085 * u_scale;
          vec2 dPR2 = reflectP - hand;
          float sAlongR = dot(dPR2, oarTR);
          float sPerpR  = dot(dPR2, oarNR);
          if (sAlongR > 0.0 && sAlongR < bladeStartR) {
            vec2 oarPtWorld = hand + oarTR * sAlongR;
            if (oarPtWorld.y > oarWaterlineR) {
              float dR = abs(sPerpR) - shaftHalfR;
              float shaftRefMask = smoothstep(0.001, -0.001, dR);
              refMask = max(refMask, shaftRefMask);
            }
          }
          vec2 oarlockBR = boatCenter + vec2(-0.040, 0.005) * u_scale;
          vec2 handBR = hand + vec2(0.0, 0.005 * u_scale);
          vec2 oarBVecR = oarlockBR - handBR;
          float oarBLenR = length(oarBVecR);
          vec2 oarBTR = oarBVecR / oarBLenR;
          vec2 oarBNR = vec2(-oarBTR.y, oarBTR.x);
          float oarBHalfR = 0.003 * u_scale;
          vec2 dPRB = reflectP - handBR;
          float oarBAlongR = dot(dPRB, oarBTR);
          float oarBPerpR  = dot(dPRB, oarBNR);
          if (oarBAlongR > 0.0 && oarBAlongR < oarBLenR) {
            float dRB = abs(oarBPerpR) - oarBHalfR;
            float oarBRefMask = smoothstep(0.001, -0.001, dRB);
            refMask = max(refMask, oarBRefMask);
          }
          vec2 hpR = reflectP - boatCenter;
          float hullR = sdEllipse(hpR, vec2(0.55, 0.012) * u_scale);
          float hullRefMask = smoothstep(0.002, -0.002, hullR);
          vec3 reflectCol = vec3(0.20, 0.18, 0.25);
          col = mix(col, reflectCol, refMask * reflectAtten * 0.35);
          col = mix(col, vec3(0.18, 0.30, 0.20), hullRefMask * reflectAtten * 0.40);
        }
      }

      float speedFactor = clamp(u_speed, 0.0, 1.0);
      vec2 stern = boatCenter + vec2(-0.55 * u_scale, 0.0);
      float wakeLength = mix(0.20, 0.80, speedFactor) * u_scale;
      float wakeT = clamp((stern.x - P.x) / wakeLength, 0.0, 1.0);
      float wakeMaxW = mix(0.015, 0.060, speedFactor);
      float wakeHalfW = mix(0.006, wakeMaxW, wakeT) * u_scale;
      float wakeDist = abs(y - stern.y);
      float wakeShape = smoothstep(wakeHalfW, wakeHalfW * 0.3, wakeDist);
      float wakeLong = step(P.x, stern.x) * (1.0 - wakeT * 0.5);
      float bandPos = wakeDist / max(wakeHalfW, 0.0001);
      float wakeBand = exp(-pow((bandPos - 0.85) * 8.0, 2.0));
      float wakeNoise = fbm(vec2((u - flow * 0.3) * 30.0, y * 80.0 + u_time * 0.5));
      float wakeFoam = wakeShape * wakeLong * (0.4 + 0.6 * wakeNoise);
      float wakeEdges = wakeBand * wakeShape * wakeLong * 0.6;
      float wakeIntensity = mix(0.6, 1.0, speedFactor);
      col = mix(col, vec3(0.95, 0.97, 1.0), wakeFoam * 0.7 * wakeIntensity);
      col = mix(col, vec3(1.0, 1.0, 1.0), wakeEdges * 0.9 * wakeIntensity);

      for (int fi = 0; fi < 3; fi++) {
        float ffi = float(fi);
        float period = 6.0 + ffi * 1.3;
        float jumpT = mod(u_time + ffi * 2.7, period);
        float jumpDur = 0.8;
        if (jumpT < jumpDur) {
          float t = jumpT / jumpDur;
          float cycleId = floor((u_time + ffi * 2.7) / period);
          float fx = hash(vec2(cycleId, ffi * 11.0));
          float fyOff = hash(vec2(cycleId * 1.7, ffi * 13.0));
          float fishX = 0.05 + fx * 0.9;
          float fishBaseY = 0.10 + fyOff * 0.30;
          float arc = 4.0 * t * (1.0 - t);
          float fishY = fishBaseY + arc * 0.06;
          float bodyRot = mix(-0.6, 0.6, t);
          vec2 fishPos = vec2(fishX, fishY);
          vec2 dF = P - fishPos;
          float cF = cos(bodyRot), sF = sin(bodyRot);
          vec2 dFLocal = vec2(cF * dF.x + sF * dF.y, -sF * dF.x + cF * dF.y);
          float bodyD = sdEllipse(dFLocal, vec2(0.012, 0.004));
          float bodyMask = smoothstep(0.001, -0.001, bodyD);
          vec3 fishCol = vec3(0.55, 0.62, 0.70);
          col = mix(col, fishCol, bodyMask);
          float bellyMask = bodyMask * smoothstep(0.0, -0.003, dFLocal.y);
          col = mix(col, vec3(0.85, 0.88, 0.90), bellyMask * 0.6);
          vec2 tailPos = vec2(-0.012, 0.0);
          float tailD = max(abs(dFLocal.x - tailPos.x) - 0.005,
                           abs(dFLocal.y) - 0.004 * (1.0 - clamp((tailPos.x - dFLocal.x) / 0.005, 0.0, 1.0)));
          float tailMask = smoothstep(0.001, -0.001, tailD);
          col = mix(col, fishCol * 0.85, tailMask);
          vec2 eyePos = vec2(0.008, -0.001);
          float eyeMask = smoothstep(0.0015, 0.0005, distance(dFLocal, eyePos));
          col = mix(col, vec3(0.05, 0.05, 0.05), eyeMask);
          if (t < 0.15 || t > 0.85) {
            float splashT = t < 0.15 ? t / 0.15 : (1.0 - t) / 0.15;
            float splashY = fishBaseY;
            float dSplash = distance(P, vec2(fishX, splashY));
            float splashFade = smoothstep(0.025, 0.0, dSplash) *
                              step(splashY - 0.01, y) *
                              splashT;
            col = mix(col, vec3(1.0, 1.0, 1.0), splashFade * 0.5);
          }
        }
      }

      vec2 oarlockB = boatCenter + vec2(-0.040, 0.005) * u_scale;
      vec2 handB = hand + vec2(0.0, 0.005 * u_scale);
      vec2 oarBVec = oarlockB - handB;
      float oarBLen = length(oarBVec);
      vec2 oarBT = oarBVec / oarBLen;
      vec2 oarBN = vec2(-oarBT.y, oarBT.x);
      float oarBAlong = dot(P - handB, oarBT);
      float oarBPerp  = dot(P - handB, oarBN);
      float oarBHalfW = 0.003 * u_scale;
      if (oarBAlong > 0.0 && oarBAlong < oarBLen) {
        float dB = abs(oarBPerp) - oarBHalfW;
        float oarBMask = smoothstep(0.001, -0.001, dB);
        col = mix(col, vec3(0.55, 0.55, 0.55), oarBMask);
        col = mix(col, vec3(0.55, 0.55, 0.55) * 0.75,
                  oarBMask * smoothstep(0.0, oarBHalfW, oarBPerp));
      }

      vec2 hp = P - boatCenter;
      float hullShape = sdEllipse(hp, vec2(0.55, 0.012) * u_scale);
      float hullMask = smoothstep(0.002, -0.002, hullShape);
      float hullShade = smoothstep(-0.012 * u_scale, 0.012 * u_scale, hp.y);
      vec3 hullCol = mix(vec3(0.75, 0.92, 0.70),
                         vec3(0.30, 0.50, 0.30), hullShade);
      float waterline = smoothstep(0.003, 0.0, abs(hp.y - 0.004 * u_scale));
      hullCol = mix(hullCol, vec3(0.15, 0.10, 0.08), waterline * 0.5);
      col = mix(col, hullCol, hullMask);
      float deckRim = smoothstep(0.0015, 0.0, abs(hullShape + 0.002)) *
                      smoothstep(0.002, -0.008 * u_scale, hp.y);
      col = mix(col, vec3(1.0, 0.97, 0.88), deckRim * 0.7);

      float refl = smoothstep(0.020 * u_scale, 0.0, boatCenter.y - y) *
                   step(y, boatCenter.y) * step(y, horizon) *
                   smoothstep(0.55 * u_scale, 0.15 * u_scale, abs(P.x - boatCenter.x));
      col *= 1.0 - refl * 0.15;

      vec2 riggerBase = boatCenter + vec2(-0.025, 0.012) * u_scale;
      float riggerSeg = sdSegment(P, riggerBase, oarlock);
      float riggerMask = smoothstep(0.002, 0.001, riggerSeg);
      col = mix(col, vec3(0.4, 0.4, 0.45), riggerMask);

      float lockMask = smoothstep(0.005, 0.003, distance(P, oarlock));
      col = mix(col, vec3(0.2, 0.2, 0.25), lockMask);

      float deckLine = boatCenter.y + 0.002;
      vec3 skinCol = vec3(0.92, 0.75, 0.62);
      vec3 shortsCol = vec3(0.15, 0.15, 0.18);
      vec3 shirtCol = vec3(0.85, 0.20, 0.15);

      float thighD = sdSegment(P, hip, knee);
      float thighMask = smoothstep(0.012 * u_scale, 0.010 * u_scale, thighD);
      col = mix(col, shortsCol, thighMask * step(deckLine, y));

      float shinD = sdSegment(P, knee, foot);
      float shinMask = smoothstep(0.010 * u_scale, 0.008 * u_scale, shinD);
      col = mix(col, skinCol, shinMask * step(deckLine, y));
      vec2 shinDir = normalize(foot - knee);
      vec2 shinNrm = vec2(-shinDir.y, shinDir.x);
      float shinSide = dot(P - (knee + foot) * 0.5, shinNrm);
      col = mix(col, skinCol * 0.78,
                shinMask * step(deckLine, y) * smoothstep(0.0, 0.008 * u_scale, shinSide));

      vec2 torsoMid = (hip + shoulder) * 0.5;
      vec2 torsoDir = normalize(shoulder - hip);
      vec2 torsoNrm = vec2(-torsoDir.y, torsoDir.x);
      float torsoLen = length(shoulder - hip);
      float backSign = sign(dot(torsoNrm, vec2(1.0, 0.0)));
      float torsoAlong = dot(P - hip, torsoDir);
      float torsoTAlong = clamp(torsoAlong / torsoLen, 0.0, 1.0);
      float torsoSideRaw = dot(P - torsoMid, torsoNrm);
      float curveOffset = 0.005 * u_scale * sin(torsoTAlong * 3.14159) * (0.6 + 0.4 * (1.0 - torsoTAlong)) * backSign;
      float torsoSide = torsoSideRaw - curveOffset;
      float torsoHalfW = mix(0.014, 0.017, smoothstep(0.0, 1.0, torsoTAlong)) * u_scale;
      float distToAxis = abs(torsoSide);
      float endCap = min(distance(P, hip), distance(P, shoulder));
      float torsoMask;
      if (torsoAlong < 0.0)        torsoMask = smoothstep(torsoHalfW + 0.002, torsoHalfW - 0.001, endCap);
      else if (torsoAlong > torsoLen) torsoMask = smoothstep(torsoHalfW + 0.002, torsoHalfW - 0.001, endCap);
      else                          torsoMask = smoothstep(torsoHalfW + 0.002, torsoHalfW - 0.001, distToAxis);

      float shirtBottomT = 0.05;
      float shirtMask = torsoMask * smoothstep(shirtBottomT - 0.04, shirtBottomT + 0.02, torsoTAlong);
      float shirtRevealMask = torsoMask * (1.0 - smoothstep(shirtBottomT - 0.04, shirtBottomT + 0.02, torsoTAlong));

      col = mix(col, shortsCol, shirtRevealMask * step(deckLine, y));
      col = mix(col, shortsCol * 0.6,
                shirtRevealMask * step(deckLine, y) * smoothstep(0.0, 0.012 * u_scale, torsoSide));

      col = mix(col, shirtCol, shirtMask * step(deckLine, y));
      col = mix(col, shirtCol * 0.7,
                shirtMask * step(deckLine, y) * smoothstep(0.0, 0.015 * u_scale, torsoSide));
      col = mix(col, shirtCol * 1.3,
                shirtMask * step(deckLine, y) * smoothstep(0.0, -0.012 * u_scale, torsoSide));

      float stripeFreq = 1.0 / (0.005 * u_scale);
      float stripe = step(0.5, fract(torsoSide * stripeFreq));
      col = mix(col, shirtCol * 0.55,
                shirtMask * step(deckLine, y) * stripe * 0.6);

      float stripeOffset = 0.004 * u_scale;
      float stripeWidth = 0.0012 * u_scale;
      float ws1 = smoothstep(stripeWidth, stripeWidth - 0.0006, abs(torsoSide - stripeOffset));
      float ws2 = smoothstep(stripeWidth, stripeWidth - 0.0006, abs(torsoSide + stripeOffset));
      col = mix(col, vec3(1.0, 1.0, 1.0),
                shirtMask * step(deckLine, y) * max(ws1, ws2));

      float upperArmD = sdSegment(P, shoulder, elbow);
      float upperArmMask = smoothstep(0.011 * u_scale, 0.009 * u_scale, upperArmD);
      col = mix(col, skinCol, upperArmMask);
      vec2 uaDir = normalize(elbow - shoulder);
      vec2 uaNrm = vec2(-uaDir.y, uaDir.x);
      float uaSide = dot(P - (shoulder + elbow) * 0.5, uaNrm);
      col = mix(col, skinCol * 0.78,
                upperArmMask * smoothstep(0.0, 0.009 * u_scale, uaSide));

      float uaAlong = dot(P - shoulder, uaDir);
      float upperArmLen = length(elbow - shoulder);
      float sleeveLen = upperArmLen * 0.40;
      float sleeveMaskUA = upperArmMask
                          * step(0.0, uaAlong)
                          * smoothstep(sleeveLen + 0.002, sleeveLen - 0.002, uaAlong);
      float sleeveD = sdSegment(P, shoulder, shoulder + uaDir * sleeveLen);
      float sleeveBody = smoothstep(0.014 * u_scale, 0.012 * u_scale, sleeveD);
      col = mix(col, shirtCol, sleeveBody * sleeveMaskUA);
      col = mix(col, shirtCol * 0.7,
                sleeveBody * sleeveMaskUA * smoothstep(0.0, 0.012 * u_scale, uaSide));
      float sleeveCapD = distance(P, shoulder);
      float sleeveCap = smoothstep(0.014 * u_scale, 0.012 * u_scale, sleeveCapD);
      col = mix(col, shirtCol, sleeveCap * upperArmMask);
      col = mix(col, shirtCol * 0.7,
                sleeveCap * upperArmMask * smoothstep(0.0, 0.012 * u_scale, uaSide));

      float sStripeOff = 0.0030 * u_scale;
      float sStripeW = 0.0010 * u_scale;
      float sBand = sleeveLen - 0.003 * u_scale;
      float ss1 = smoothstep(sStripeW, sStripeW - 0.0005, abs(uaAlong - (sBand - sStripeOff)));
      float ss2 = smoothstep(sStripeW, sStripeW - 0.0005, abs(uaAlong - (sBand + sStripeOff)));
      col = mix(col, vec3(1.0, 1.0, 1.0),
                (sleeveBody + sleeveCap) * upperArmMask * max(ss1, ss2));

      float forearmD = sdSegment(P, elbow, hand);
      float forearmLen = length(hand - elbow);
      vec2 faDir = normalize(hand - elbow);
      vec2 faNrm = vec2(-faDir.y, faDir.x);
      float faAlong = dot(P - elbow, faDir);
      float faAlongN = clamp(faAlong / forearmLen, 0.0, 1.0);
      float faRadius = mix(0.010, 0.006, faAlongN) * u_scale;
      float forearmMask = smoothstep(faRadius, faRadius - 0.002 * u_scale, forearmD);
      col = mix(col, skinCol, forearmMask);
      float faSide = dot(P - (elbow + hand) * 0.5, faNrm);
      col = mix(col, skinCol * 0.78,
                forearmMask * smoothstep(0.0, 0.008 * u_scale, faSide));

      float wristR = 0.008 * u_scale;
      float handFill = smoothstep(wristR, wristR - 0.001, distance(P, hand));
      col = mix(col, skinCol, handFill);
      float handSide = dot(P - hand, faNrm);
      col = mix(col, skinCol * 0.78, handFill * smoothstep(0.0, 0.006 * u_scale, handSide));

      vec2 neckBase = shoulder;
      vec2 neckTop = head + vec2(0.0, -0.018 * u_scale);
      float neckD = sdSegment(P, neckBase, neckTop);
      float neckMask = smoothstep(0.008 * u_scale, 0.006 * u_scale, neckD);
      neckMask *= (1.0 - shirtMask) * (1.0 - shirtRevealMask);
      col = mix(col, skinCol, neckMask);
      vec2 neckDir = normalize(neckTop - neckBase);
      vec2 neckNrm = vec2(-neckDir.y, neckDir.x);
      float neckBackSign = sign(dot(neckNrm, vec2(1.0, 0.0)));
      float neckSide = dot(P - (neckBase + neckTop) * 0.5, neckNrm) * neckBackSign;
      col = mix(col, skinCol * 0.72,
                neckMask * smoothstep(0.0, 0.006 * u_scale, neckSide));

      float headR = 0.018 * u_scale;
      float headDist = distance(P, head);
      float headFill = smoothstep(headR, headR - 0.001, headDist);
      col = mix(col, skinCol, headFill);
      vec2 faceDirRaw = normalize(hand - shoulder);
      vec2 faceDir = faceDirRaw;
      vec2 backOfHead = -faceDir;
      float hairSide = dot(P - head, backOfHead);
      float hairMask = headFill * smoothstep(-0.003 * u_scale, 0.005 * u_scale, hairSide);
      col = mix(col, vec3(0.20, 0.12, 0.08), hairMask);
      float chinShade = headFill * smoothstep(0.005 * u_scale, 0.015 * u_scale, head.y - P.y);
      col = mix(col, skinCol * 0.75, chinShade * 0.5);
      vec2 foreheadPos = head + faceDir * 0.008 * u_scale;
      float foreheadHi = headFill * smoothstep(0.005 * u_scale, 0.0, distance(P, foreheadPos));
      col = mix(col, vec3(1.0, 0.95, 0.88), foreheadHi * 0.4);

      float oarWaterline = boatCenter.y - 0.085 * u_scale;
      bool aboveOarWater = y > oarWaterline;

      vec2 oarA = hand;
      vec2 oarBpt = bladeTip;
      if ((oarA.y - oarWaterline) * (oarBpt.y - oarWaterline) < 0.0) {
        float tCross = (oarWaterline - oarA.y) / (oarBpt.y - oarA.y);
        vec2 crossPt = mix(oarA, oarBpt, tCross);
        float bladeBelow = step(bladeTip.y, oarWaterline);

        if (bladeBelow > 0.5 && phase < 0.5) {
          float driveT = phase / 0.5;
          float trailLen = mix(0.10, 0.60, speedFactor) * u_scale;
          float trailAlong = P.x - crossPt.x;
          float trailPerp = abs(y - crossPt.y);
          if (trailAlong > 0.0 && trailAlong < trailLen && y < oarWaterline + 0.002) {
            float tt = trailAlong / trailLen;
            float trailHalfW = mix(0.003, mix(0.012, 0.035, speedFactor), tt) * u_scale;
            float trailNoise = fbm(vec2(u * 80.0 - u_time * 2.0, y * 100.0));
            float sharpness = mix(0.2, 0.8, tt);
            float trailShape = smoothstep(trailHalfW, trailHalfW * sharpness, trailPerp);
            float trailFade = (1.0 - tt);
            float diffusion = mix(1.0, 0.5, tt);
            float trail = trailShape * trailFade * diffusion *
                         (0.4 + 0.6 * trailNoise);
            col = mix(col, vec3(1.0, 1.0, 1.0), trail * 0.95 * driveT);
            float bubbles = noise(vec2(u * 250.0 - u_time * 3.0, y * 280.0));
            float bubblesMask = smoothstep(0.78, 0.95, bubbles) *
                               trailShape * (1.0 - tt) * (1.0 - tt);
            col = mix(col, vec3(1.0, 1.0, 1.0), bubblesMask * 0.8 * driveT);
          }
        }

        float dCross = distance(P, crossPt);
        float splashRadius = 0.025 * u_scale;
        float splashAbove = smoothstep(splashRadius, 0.0, dCross) * step(oarWaterline, y);
        float verticalFade = smoothstep(0.030 * u_scale, 0.0, y - oarWaterline);
        col = mix(col, vec3(1.0), splashAbove * verticalFade * 0.7 * bladeBelow);
        float ring = exp(-pow((y - oarWaterline) * 200.0, 2.0)) *
                     smoothstep(0.020 * u_scale, 0.0, abs(crossPt.x - P.x));
        col = mix(col, vec3(1.0), ring * 0.6 * bladeBelow);
        float drops = noise(vec2(u * 200.0, y * 200.0 + u_time * 8.0));
        float dropsMask = smoothstep(0.75, 0.95, drops) *
                         smoothstep(splashRadius * 1.5, 0.0, dCross) *
                         step(oarWaterline, y);
        col = mix(col, vec3(1.0), dropsMask * bladeBelow);
      }

      vec2 oarVec = bladeTip - hand;
      float oarLen = length(oarVec);
      vec2 oarT = oarVec / oarLen;
      vec2 oarN = vec2(-oarT.y, oarT.x);
      vec2 dP = P - hand;
      float sAlong = dot(dP, oarT);
      float sPerp  = dot(dP, oarN);
      float lockS = dot(oarlock - hand, oarT);
      float shaftHalfW = 0.003 * u_scale;
      float bladeStartS = oarLen * 0.85;
      bool inShaft = sAlong > 0.0 && sAlong < bladeStartS;

      if (inShaft && aboveOarWater) {
        float d = abs(sPerp) - shaftHalfW;
        float shaftMask = smoothstep(0.001, -0.001, d);
        vec3 shaftCol = vec3(0.95, 0.95, 0.95);
        col = mix(col, shaftCol, shaftMask);
        col = mix(col, shaftCol * 0.75,
                  shaftMask * smoothstep(0.0, shaftHalfW, sPerp));
      }

      if (sAlong > lockS - 0.010 * u_scale && sAlong < lockS + 0.006 * u_scale && aboveOarWater) {
        float sleeveW = 0.0040 * u_scale;
        float d = abs(sPerp) - sleeveW;
        float slM = smoothstep(0.001, -0.001, d);
        col = mix(col, vec3(0.08, 0.08, 0.10), slM);
      }

      if (sAlong > bladeStartS && sAlong < oarLen + 0.003 && aboveOarWater) {
        float bt = (sAlong - bladeStartS) / (oarLen - bladeStartS);
        float widthCurve = bt < 0.3 ? bt / 0.3 : 1.0;
        float bladeW = mix(0.0044, 0.022, widthCurve) * u_scale;
        float topEdge    =  bladeW * 0.5;
        float bottomEdge = -bladeW * 0.5;
        if (sPerp < topEdge && sPerp > bottomEdge) {
          float edgeT = min(topEdge - sPerp, sPerp - bottomEdge);
          float bladeMask = smoothstep(0.0, 0.002, edgeT);
          vec3 bladeMain = vec3(0.85, 0.18, 0.12);
          float face = (sPerp - bottomEdge) / (topEdge - bottomEdge);
          bladeMain *= mix(0.85, 1.1, face);
          col = mix(col, bladeMain, bladeMask);
        }
      }

      float capHeadR = 0.018 * u_scale;
      vec2 capFaceDir = vec2(sign(hand.x - shoulder.x), 0.0);
      float capDist = distance(P, head);
      float capR = capHeadR + 0.002 * u_scale;
      float capMask = smoothstep(capR, capR - 0.001, capDist) * step(head.y, P.y);
      col = mix(col, vec3(0.10, 0.25, 0.55), capMask);
      vec2 visorCenter = head + capFaceDir * 0.014 * u_scale + vec2(0.0, 0.002 * u_scale);
      float visor = sdEllipse(P - visorCenter, vec2(0.012, 0.003) * u_scale);
      float visorMask = smoothstep(0.001, -0.001, visor);
      col = mix(col, vec3(0.05, 0.15, 0.40), visorMask);

      float weatherCycle = u_time / 60.0;
      float rainPhase = fract(weatherCycle / 3.0);
      float rainIntensity = 0.0;
      if (rainPhase > 0.6 && rainPhase < 0.95) {
        float rt = (rainPhase - 0.6) / 0.35;
        rainIntensity = sin(rt * 3.14159265);
      }

      if (rainIntensity > 0.01) {
        for (int ri = 0; ri < 3; ri++) {
          float rfi = float(ri);
          float rainScroll = mod(u_time * (8.0 + rfi * 4.0), 1024.0);
          float rainDensity = mix(40.0, 80.0, rfi * 0.5);
          vec2 rainUV = vec2(u + y * 0.15, y);
          rainUV.x = rainUV.x * rainDensity + rfi * 17.0;
          rainUV.y = rainUV.y * (rainDensity * 0.4) + rainScroll;
          vec2 cellPos = wrapCoord(rainUV);
          float cellX = floor(cellPos.x);
          float cellY = floor(cellPos.y);
          float h = hash(vec2(cellX, cellY));
          vec2 localR = fract(rainUV) - vec2(0.5, 0.5);
          float dropD = max(abs(localR.x) - 0.05, abs(localR.y) - 0.30);
          float dropMask = smoothstep(0.02, 0.0, dropD) *
                          step(0.7, h) *
                          rainIntensity *
                          mix(0.4, 1.0, rfi / 2.0);
          col = mix(col, vec3(0.85, 0.88, 0.95), dropMask * 0.4);
        }
        col = mix(col, vec3(0.55, 0.58, 0.65), rainIntensity * 0.12);
      }

      float dayCycleR = fract(u_time / 300.0);
      float sunHeightR = sin(dayCycleR * 6.2831853 - 1.57);
      float dayBrightness = smoothstep(-0.1, 0.4, sunHeightR);
      float rainbowFactor = rainIntensity * dayBrightness;

      if (rainbowFactor > 0.05 && y > horizon) {
        float sunXR = mod(0.30 + dayCycleR * 0.6, 1.0);
        vec2 rainbowCenter = vec2(1.0 - sunXR, horizon - 0.15);
        float rainbowR = 0.45;
        float rainbowD = distance(P, rainbowCenter);
        float rainbowBand = abs(rainbowD - rainbowR);
        float rainbowWidth = 0.04;
        if (rainbowBand < rainbowWidth) {
          float bandT = (rainbowD - rainbowR + rainbowWidth) / (2.0 * rainbowWidth);
          vec3 rainbowCol;
          if (bandT < 0.16)      rainbowCol = vec3(0.55, 0.20, 0.70);
          else if (bandT < 0.33) rainbowCol = vec3(0.30, 0.30, 0.85);
          else if (bandT < 0.50) rainbowCol = vec3(0.30, 0.75, 0.85);
          else if (bandT < 0.66) rainbowCol = vec3(0.40, 0.85, 0.40);
          else if (bandT < 0.83) rainbowCol = vec3(0.95, 0.85, 0.35);
          else                    rainbowCol = vec3(0.95, 0.45, 0.35);
          float bandFade = smoothstep(rainbowWidth, rainbowWidth * 0.4, rainbowBand);
          col = mix(col, rainbowCol, bandFade * rainbowFactor * 0.55);
        }
      }

      gl_FragColor = vec4(col, 1.0);
    }
  </script>

  <script src="rowing_display.js"></script>
  <script src="ftms_integration.js"></script>
