<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>XeSync Test</title>
</head>
<body>

<b>AUTH</b><br>
<button onclick="doAutoLogin()">autoLogin</button>
<button onclick="doLoginOk()">loginResult OK</button>
<button onclick="doLoginFail()">loginResult FAIL</button>
<br><br>

<b>OFFLINE SAVE CYCLE</b><br>
<button onclick="doSaveData()">1. saveData (offline)</button>
<button onclick="doUploadWorkout()">2. uploadWorkout</button>
<button onclick="doUploadAck()">3. uploadAck</button>
<button onclick="doTagCleared()">4. tagCleared (AI2 cleared TinyDB tag)</button>
<br><br>

<b>LOG</b> <button onclick="log.value=''">clear</button><br>
<textarea id="log" rows="30" cols="100" readonly></textarea>

<script>
  var API = 'https://xesync.enlistia.com/api';
  var currentToken = '';
  var lastWorkoutTag = '';

  function send(obj) {
    if (window.AppInventor && AppInventor.setWebViewString) {
      AppInventor.setWebViewString(JSON.stringify(obj));
    }
  }

  function handleAppResponse(val) {
    var msg;
    try { msg = JSON.parse(val); } catch(e) { addLog('ERROR: bad JSON from app: ' + val); return; }
    switch (msg.action) {
      case 'autoLogin':
        addLog('APP → autoLogin with token ' + (msg.token || '(none)'));
        break;
      case 'loginResult':
        if (msg.success) {
          currentToken = msg.token;
          addLog('APP → loginResult OK, user=' + msg.username + ', token=' + msg.token.slice(0,16) + '...');
        } else {
          addLog('APP → loginResult FAIL: ' + msg.error);
        }
        break;
      case 'saveAck':
        addLog('APP → saveAck (workout stored in TinyDB)');
        break;
      case 'uploadAck':
        addLog('APP → uploadAck cleared TinyDB tag: ' + msg.workout);
        break;
      case 'uploadWorkout':
        addLog('APP → uploadWorkout tag=' + msg.workout);
        break;
      default:
        addLog('APP → ' + msg.action + ' ' + JSON.stringify(msg));
    }
  }
  window.handleAppResponse = handleAppResponse;

  function fetchToken(cb) {
    addLog('Fetching real token for demo/demo1234...');
    fetch(API + '/rpc/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: 'demo', password: 'demo1234' })
    })
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      var row = Array.isArray(arr) ? arr[0] : arr;
      if (row && row.status === 'success') {
        currentToken = row.token;
        addLog('Login OK — token=' + row.token.slice(0,16) + '...');
        cb(row.token);
      } else {
        addLog('Login FAILED: ' + (row && row.error));
      }
    })
    .catch(function(e) { addLog('Login ERROR: ' + e.message); });
  }

  function doAutoLogin() {
    fetchToken(function(t) {
      addLog('Sending autoLogin to app...');
      send({ action: 'autoLogin', token: t });
    });
  }

  function doLoginOk() {
    fetchToken(function(t) {
      addLog('Sending loginResult OK to app...');
      send({ action: 'loginResult', success: true, token: t, username: 'demo' });
    });
  }

  function doLoginFail() {
    addLog('Sending loginResult FAIL to app...');
    send({ action: 'loginResult', success: false, error: 'Invalid credentials' });
  }

  function doSaveData() {
    addLog('Sending saveData (simulates offline workout saved by ftms_integration)...');
    send({ action: 'saveData', data: buildPayload() });
    addLog('Waiting for saveAck from app...');
  }

  function doUploadWorkout() {
    if (!currentToken) { addLog('ERROR: no token — do login first'); return; }
    lastWorkoutTag = workoutTag();
    addLog('Sending uploadWorkout — tag=' + lastWorkoutTag + ' token=' + currentToken.slice(0,16) + '...');
    send({ action: 'uploadWorkout', token: currentToken, workout: lastWorkoutTag, data: buildPayload() });
    addLog('Waiting for uploadAck from app...');
  }

  function doUploadAck() {
    if (!lastWorkoutTag) { addLog('ERROR: no workout tag — do uploadWorkout first'); return; }
    addLog('Sending uploadAck — tag=' + lastWorkoutTag + ' (simulates AI2 clearing TinyDB)');
    send({ action: 'uploadAck', workout: lastWorkoutTag });
  }

  function doTagCleared() {
    if (!lastWorkoutTag) { addLog('ERROR: no workout tag — do uploadWorkout first'); return; }
    addLog('Sending tagCleared — tag=' + lastWorkoutTag + ' (AI2 confirmed TinyDB tag cleared)');
    send({ action: 'tagCleared', workout: lastWorkoutTag });
  }

  function buildPayload() {
    var DURATION = 1820, DISTANCE = 5012, STROKES = 412, CALORIES = 287;
    var BASE = { pace:108, watts:145, spm:24.5, hr:142 };
    var samples = [], dist = 0, strokes = 0;
    for (var t = 0; t < DURATION; t++) {
      var prog = t / DURATION;
      var n = function(s) { return Math.sin(t * 0.31 + s * 127.1) * 0.5 + 0.5; };
      var spm   = clamp(BASE.spm   + Math.sin(prog*Math.PI*4)*3  + n(1)*2  - 1,  14, 36);
      var watts = clamp(BASE.watts + Math.sin(prog*Math.PI*6)*20 + n(2)*15 - 7,  60, 300);
      var hr    = clamp(BASE.hr    + Math.sin(prog*Math.PI*2)*15 + n(3)*8  - 4 + prog*10, 100, 185);
      var pace  = clamp(BASE.pace  - Math.sin(prog*Math.PI*4)*10 + n(4)*6  - 3,  85, 180);
      dist    += DISTANCE / DURATION;
      strokes += STROKES  / DURATION;
      samples.push([t, Math.round(dist), Math.round(strokes),
        Math.round(spm*10)/10, Math.round(watts), Math.round(hr), Math.round(pace)]);
    }
    function avgCol(i) { return samples.reduce(function(s,r){return s+r[i];},0)/samples.length; }
    return {
      version: 1,
      summary: {
        duration: DURATION, distance: DISTANCE, strokes: STROKES, calories: CALORIES,
        avgSpm: Math.round(avgCol(3)*10)/10, avgPace: Math.round(avgCol(6)),
        avgWatts: Math.round(avgCol(4)), avgHr: Math.round(avgCol(5))
      },
      samples: samples
    };
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function workoutTag() {
    var d = new Date(), p = function(n){return n<10?'0'+n:''+n;};
    return 'workout_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())
      +'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());
  }

  function addLog(txt) {
    var el = document.getElementById('log');
    el.value += txt + '\n';
    el.scrollTop = el.scrollHeight;
  }
</script>
</body>
</html>
