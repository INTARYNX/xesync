<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>XeSync Test</title>
</head>
<body>

<b>AUTH</b><br>
<button onclick="doAutoLogin()">autoLogin</button>
<button onclick="doLoginOk()">loginResult OK</button>
<button onclick="send({action:'loginResult',success:false,error:'Invalid credentials'})">loginResult FAIL</button>
<button onclick="send({action:'goHome'})">goHome</button>
<button onclick="send({action:'saveAck'})">saveAck</button>
<br><br>

<b>OFFLINE SAVE CYCLE</b><br>
<button onclick="doSaveData()">saveData (offline)</button>
<button onclick="doUploadWorkout()">uploadWorkout</button>
<button onclick="doUploadAck()">uploadAck</button>
<br><br>

<b>LOG</b> <button onclick="log.value=''">clear</button><br>
<textarea id="log" rows="30" cols="100" readonly></textarea>

<script>
  var API = 'https://xesync.enlistia.com/api';
  var currentToken = '';
  var lastWorkoutTag = '';

  function send(obj) {
    var json = JSON.stringify(obj);
    if (window.AppInventor && AppInventor.setWebViewString) AppInventor.setWebViewString(json);
    addLog('→ ' + json);
  }

  function handleAppResponse(val) {
    addLog('← ' + val);
    try {
      var msg = JSON.parse(val);
      if (msg.token) { currentToken = msg.token; addLog('  [token saved]'); }
      if (msg.workout) { lastWorkoutTag = msg.workout; addLog('  [workout tag: ' + msg.workout + ']'); }
    } catch(e) {}
  }
  window.handleAppResponse = handleAppResponse;

  function fetchToken(cb) {
    addLog('  [fetching token for demo...]');
    fetch(API + '/rpc/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: 'demo', password: 'demo1234' })
    })
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      var row = Array.isArray(arr) ? arr[0] : arr;
      if (row && row.status === 'success') {
        currentToken = row.token;
        addLog('  [token: ' + row.token.slice(0,16) + '...]');
        cb(row.token);
      } else {
        addLog('  [login failed: ' + (row && row.error) + ']');
      }
    })
    .catch(function(e) { addLog('  [error: ' + e.message + ']'); });
  }

  function doAutoLogin() {
    fetchToken(function(t) { send({ action: 'autoLogin', token: t }); });
  }

  function doLoginOk() {
    fetchToken(function(t) { send({ action: 'loginResult', success: true, token: t, username: 'demo' }); });
  }

  function doSaveData() {
    send({ action: 'saveData', data: buildPayload() });
  }

  function doUploadWorkout() {
    if (!currentToken) { addLog('  [no token — do login first]'); return; }
    lastWorkoutTag = workoutTag();
    send({ action: 'uploadWorkout', token: currentToken, workout: lastWorkoutTag, data: buildPayload() });
  }

  function doUploadAck() {
    if (!lastWorkoutTag) { addLog('  [no workout tag — do uploadWorkout first]'); return; }
    send({ action: 'uploadAck', workout: lastWorkoutTag });
  }

  function buildPayload() {
    var DURATION = 1820, DISTANCE = 5012, STROKES = 412, CALORIES = 287;
    var BASE = { pace:108, watts:145, spm:24.5, hr:142 };
    var samples = [], dist = 0, strokes = 0;
    for (var t = 0; t < DURATION; t++) {
      var prog = t / DURATION;
      var n = function(s) { return Math.sin(t * 0.31 + s * 127.1) * 0.5 + 0.5; };
      var spm   = clamp(BASE.spm   + Math.sin(prog*Math.PI*4)*3  + n(1)*2  - 1,  14, 36);
      var watts = clamp(BASE.watts + Math.sin(prog*Math.PI*6)*20 + n(2)*15 - 7,  60, 300);
      var hr    = clamp(BASE.hr    + Math.sin(prog*Math.PI*2)*15 + n(3)*8  - 4 + prog*10, 100, 185);
      var pace  = clamp(BASE.pace  - Math.sin(prog*Math.PI*4)*10 + n(4)*6  - 3,  85, 180);
      dist    += DISTANCE / DURATION;
      strokes += STROKES  / DURATION;
      samples.push([t, Math.round(dist), Math.round(strokes),
        Math.round(spm*10)/10, Math.round(watts), Math.round(hr), Math.round(pace)]);
    }
    function avgCol(i) { return samples.reduce(function(s,r){return s+r[i];},0)/samples.length; }
    return {
      version: 1,
      summary: {
        duration: DURATION, distance: DISTANCE, strokes: STROKES, calories: CALORIES,
        avgSpm: Math.round(avgCol(3)*10)/10, avgPace: Math.round(avgCol(6)),
        avgWatts: Math.round(avgCol(4)), avgHr: Math.round(avgCol(5))
      },
      samples: samples
    };
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function workoutTag() {
    var d = new Date(), p = function(n){return n<10?'0'+n:''+n;};
    return 'workout_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())
      +'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());
  }

  function addLog(txt) {
    var el = document.getElementById('log');
    el.value += txt + '\n';
    el.scrollTop = el.scrollHeight;
  }
</script>
</body>
</html>
