<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — XEsync</title>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: Helvetica, Arial, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .back {
            position: fixed;
            top: 24px;
            left: 24px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }
        .back:hover {
            color: #00d4ff;
            border-color: rgba(0,212,255,0.4);
            background: rgba(0,212,255,0.08);
            transform: translateX(-2px);
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 48px 40px;
            width: 100%; max-width: 420px;
            backdrop-filter: blur(20px);
        }
        .logo {
            font-size: 28px; font-weight: 700;
            font-family: 'Courier Prime', 'Courier New', monospace;
            color: #00d4ff; text-align: center;
            margin-bottom: 8px; letter-spacing: 2px;
        }
        .logo-sub {
            text-align: center; font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 36px; letter-spacing: 1px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block; font-size: 12px; letter-spacing: 1.5px;
            text-transform: uppercase; color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        input {
            width: 100%; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; color: #fff; font-size: 15px;
            padding: 13px 16px; outline: none;
            transition: border-color 0.2s; font-family: inherit;
        }
        input:focus { border-color: #00d4ff; }
        input::placeholder { color: rgba(255,255,255,0.2); }
        .hint { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 6px; }
        .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 28px 0; }
        .btn {
            width: 100%; padding: 14px; background: #00d4ff;
            color: #0a0a0a; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            letter-spacing: 0.5px; transition: background 0.2s, transform 0.1s;
            font-family: inherit;
        }
        .btn:hover { background: #00b8e6; }
        .btn:active { transform: scale(0.99); }
        .btn:disabled { background: rgba(0,212,255,0.3); color: rgba(255,255,255,0.4); cursor: default; }
        .terms {
            font-size: 12px; color: rgba(255,255,255,0.3);
            text-align: center; margin-top: 16px; line-height: 1.6;
        }
        .terms a { color: rgba(0,212,255,0.7); text-decoration: none; }
        .terms a:hover { color: #00d4ff; }
        .login-link {
            text-align: center; margin-top: 28px;
            font-size: 14px; color: rgba(255,255,255,0.4);
        }
        .login-link a { color: #00d4ff; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        .error {
            background: rgba(255,60,60,0.1);
            border: 1px solid rgba(255,60,60,0.3);
            border-radius: 8px; padding: 12px 16px;
            font-size: 13px; color: #ff6b6b;
            margin-bottom: 20px; display: none;
        }
        .success {
            background: rgba(0,212,255,0.08);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 8px; padding: 20px;
            font-size: 14px; color: #00d4ff;
            text-align: center; display: none; line-height: 1.6;
        }
        .strength-bar {
            height: 3px; border-radius: 2px;
            background: rgba(255,255,255,0.08);
            margin-top: 8px; overflow: hidden;
        }
        .strength-fill {
            height: 100%; width: 0%; border-radius: 2px;
            transition: width 0.3s, background 0.3s;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            text-align: center;
        }
        .footer a { color: rgba(255,255,255,0.25); text-decoration: none; }
        .footer a:hover { color: #00d4ff; }
    </style>
</head>
<body>

    <a href="index.html" class="back"><i class="fa-solid fa-arrow-left"></i> Back</a>

    <div class="card">
        <div class="logo">XEsync</div>
        <div class="logo-sub">Create your account</div>

        <div class="error" id="error"></div>
        <div class="success" id="success">
          <strong>Check your inbox</strong><br><br>
          We just sent a verification email. Click the link inside to activate your account, then sign in.
        </div>

        <form id="registerForm" onsubmit="handleSubmit(event)">

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="your_username" autocomplete="username" required>
                <div class="hint">Used to log in from the app. No spaces.</div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="divider"></div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required oninput="checkStrength(this.value)">
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                <div class="hint" id="strengthLabel"></div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" required>
            </div>

            <button type="submit" class="btn" id="submitBtn">Create Account</button>

            <div class="terms">
                By creating an account you agree to our <a href="confidentiality.html">Privacy Policy</a>.
            </div>
        </form>

        <div class="login-link">Already have an account? <a href="login.html">Log in</a></div>
    </div>

    <div class="footer">
        <a href="confidentiality.html">Privacy Policy</a>
    </div>

    <script>
        function checkStrength(pw) {
            var fill = document.getElementById('strengthFill');
            var label = document.getElementById('strengthLabel');
            var score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^a-zA-Z0-9]/.test(pw)) score++;
            var pct = ['0%','30%','55%','80%','100%'][score];
            var colors = ['','#ff4444','#ffaa00','#00cc88','#00d4ff'];
            var labels = ['','Weak','Fair','Good','Strong'];
            fill.style.width = pct;
            fill.style.background = colors[score] || '';
            label.textContent = score > 0 ? labels[score] : '';
        }

        function handleSubmit(e) {
            e.preventDefault();
            var error = document.getElementById('error');
            var success = document.getElementById('success');
            var btn = document.getElementById('submitBtn');
            error.style.display = 'none';

            var username = document.getElementById('username').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirm = document.getElementById('confirm').value;

            if (/\s/.test(username))   { showError('Username cannot contain spaces.'); return; }
            if (username.length < 3)   { showError('Username must be at least 3 characters.'); return; }
            if (password.length < 8)   { showError('Password must be at least 8 characters.'); return; }
            if (password !== confirm)  { showError('Passwords do not match.'); return; }

            btn.disabled = true;
            btn.textContent = 'Creating account…';

            fetch(XESYNC_CONFIG.apiBaseUrl + '/rpc/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, email: email, password: password })
            })
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (arr) {
                var data = Array.isArray(arr) ? arr[0] : arr;
                if (data && data.status === 'success') {
                    document.getElementById('registerForm').style.display = 'none';
                    success.style.display = 'block';
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                    showError((data && data.error) || 'Registration failed.');
                }
            })
            .catch(function (err) {
                btn.disabled = false;
                btn.textContent = 'Create Account';
                showError('Network error: ' + err.message);
            });
        }

        function showError(msg) {
            var el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
