<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — XEsync</title>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: Helvetica, Arial, sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 48px 40px;
            width: 100%; max-width: 420px;
        }
        .logo {
            font-size: 28px; font-weight: 700;
            font-family: 'Courier Prime', 'Courier New', monospace;
            color: #00d4ff; text-align: center;
            margin-bottom: 8px; letter-spacing: 2px;
        }
        .logo-sub {
            text-align: center; font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 36px; letter-spacing: 1px;
        }
        label {
            display: block; font-size: 12px; letter-spacing: 1.5px;
            text-transform: uppercase; color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        input {
            width: 100%; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
            color: #fff; font-size: 15px; padding: 13px 16px;
            outline: none; font-family: inherit;
            margin-bottom: 20px;
        }
        input:focus { border-color: #00d4ff; }
        .btn {
            width: 100%; padding: 14px;
            background: #00d4ff; color: #0a0a0a;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; letter-spacing: 0.5px;
            font-family: inherit; margin-top: 8px;
        }
        .btn:hover { background: #00b8e6; }
        .btn:disabled { background: rgba(0,212,255,0.3); color: rgba(255,255,255,0.4); cursor: default; }
        .msg {
            border-radius: 8px; padding: 12px 16px;
            font-size: 13px; margin-top: 20px;
            display: none;
        }
        .msg.error { background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.3); color: #ff6b6b; }
        .msg.success { background: rgba(60,255,120,0.08); border: 1px solid rgba(60,255,120,0.3); color: #7ee699; }
        .help-text { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 28px; line-height: 1.5; }
        .footer-link {
            display: block; text-align: center; margin-top: 24px;
            font-size: 14px; color: #00d4ff; text-decoration: none;
        }
        .footer-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">XEsync</div>
        <div class="logo-sub">Set a new password</div>

        <div id="form-block">
            <div class="help-text">Choose a new password (at least 8 characters).</div>

            <form id="resetForm" onsubmit="handleSubmit(event)">
                <label>New password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required minlength="8">
                <label>Confirm password</label>
                <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" required minlength="8">
                <button type="submit" class="btn" id="submitBtn">Set new password</button>
            </form>
        </div>

        <div class="msg" id="msg"></div>
        <a href="login.html" class="footer-link" id="loginLink" style="display:none;">Go to login</a>
    </div>

    <script>
        function getTokenFromUrl() {
            var m = window.location.search.match(/[?&]token=([^&]*)/);
            return m ? decodeURIComponent(m[1]) : null;
        }

        var token = getTokenFromUrl();
        if (!token) {
            document.getElementById('form-block').style.display = 'none';
            showMsg('Missing or invalid reset link.', 'error');
        }

        function handleSubmit(e) {
            e.preventDefault();
            var msg = document.getElementById('msg');
            var btn = document.getElementById('submitBtn');
            msg.style.display = 'none';

            var pw  = document.getElementById('password').value;
            var pw2 = document.getElementById('confirm').value;

            if (pw.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
            if (pw !== pw2)    { showMsg('Passwords do not match.', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Updating…';

            fetch(XESYNC_CONFIG.apiBaseUrl + '/rpc/reset_password_with_token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, new_password: pw })
            })
            .then(function(r) { return r.json(); })
            .then(function(arr) {
                var data = Array.isArray(arr) ? arr[0] : arr;
                if (data && data.status === 'success') {
                    document.getElementById('form-block').style.display = 'none';
                    showMsg('Password updated. You can now log in with your new password.', 'success');
                    document.getElementById('loginLink').style.display = 'block';
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Set new password';
                    showMsg((data && data.error) || 'Reset failed.', 'error');
                }
            })
            .catch(function(err) {
                btn.disabled = false;
                btn.textContent = 'Set new password';
                showMsg('Network error: ' + err.message, 'error');
            });
        }

        function showMsg(text, type) {
            var el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
